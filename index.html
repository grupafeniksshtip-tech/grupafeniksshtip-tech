<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Grupa Feniks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    header {
      padding: 60px 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .button {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: orange;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
    }

    .section {
      padding: 40px 20px;
    }

    iframe {
      width: 90%;
      max-width: 560px;
      height: 315px;
      margin: 15px 0;
    }

    footer {
      padding: 30px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <h1>GRUPA FENIKS</h1>
  <p>Music • Performances • Booking</p>

  <a class="button" href="#videos">Watch Videos</a>
  <a class="button" href="#contact">Book Us</a>
</header>

<div class="section" id="videos">
  <h2>Latest Video</h2>

  <iframe src="https://www.youtube.com/embed/VIDEO_ID"
  frameborder="0"
  allowfullscreen></iframe>

</div>

<div class="section" id="contact">
  <h2>Booking</h2>
  <p>Email us for weddings, events & concerts:</p>

  <a class="button" href="mailto:booking@grupafeniks.com">
    booking@grupafeniks.com
  </a>
</div>

<footer>
  © 2026 Grupa Feniks • Official Website
</footer>

</body>
</html>
